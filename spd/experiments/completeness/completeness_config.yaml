wandb_project: spd
seed: 0
n_mask_samples: 1

ci_config:
  mode: layerwise
  fn_type: mlp
  hidden_dims: [16]

module_info:
  - module_pattern: "layers.*.W_Q"
    C: 4
  - module_pattern: "layers.*.W_K"
    C: 4
  - module_pattern: "layers.*.W_V"
    C: 4
  - module_pattern: "layers.*.W_O"
    C: 4
  - module_pattern: "linear"
    C: 4

loss_metric_configs:
  - classname: "ImportanceMinimalityLoss"
    coeff: 3e-3
    pnorm: 1.0
    beta: 0.0
  - classname: "StochasticReconLoss"
    coeff: 1.0

output_loss_type: mse

batch_size: 1024
eval_batch_size: 2048
steps: 10000
train_log_freq: 100
eval_freq: 1000
slow_eval_freq: 5000
n_eval_steps: 5

lr_schedule:
  start_val: 1e-3
  fn_type: cosine
  final_val_frac: 0.0

eval_metric_configs:
  - classname: "CIHistograms"
    n_batches_accum: 5
  - classname: "CI_L0"
    groups: null

pretrained_model_class: "spd.experiments.completeness.models.RedundantCopyTransformer"
pretrained_model_path: /home/antoine/spd_out/train/completeness_toy_model/completeness.pth

task_config:
  task_name: completeness
