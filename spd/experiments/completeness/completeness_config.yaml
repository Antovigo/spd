wandb_project: spd
seed: 0
n_mask_samples: 1
label: "redundant_transformer_decomp"

ci_config:
  mode: global
  fn_type: global_shared_mlp
  hidden_dims: [128]

module_info:
  - module_pattern: "layers.*.W_Q"
    C: 24
  - module_pattern: "layers.*.W_K"
    C: 24
  - module_pattern: "layers.*.W_V"
    C: 24
  - module_pattern: "layers.*.W_O"
    C: 24
  - module_pattern: "linear"
    C: 24

loss_metric_configs:
  - classname: "ImportanceMinimalityLoss"
    coeff: 1e-4
    coeff_warmup_frac: 0.1
    coeff_peak_multiplier: 4.0
    coeff_anneal_start_frac: 0.1
    coeff_anneal_end_frac: 1.0
    pnorm: 1.0
    beta: 0.0
  - classname: "StochasticReconSubsetLoss"
    coeff: 1.0
  - classname: "FaithfulnessLoss"
    coeff: 10.0

output_loss_type: kl

batch_size: 1024
eval_batch_size: 2048
steps: 10000
train_log_freq: 100
eval_freq: 500
slow_eval_freq: 1000
n_eval_steps: 5

lr_schedule:
  start_val: 1e-3
  fn_type: cosine
  final_val_frac: 0.0

eval_metric_configs:
  # - classname: "CIHistograms"
  #   n_batches_accum: 5
  - classname: "CI_L0"
    groups: null
  - classname: "CompletenessCIPlots"

pretrained_model_class: "spd.experiments.completeness.models.RedundantCopyTransformer"
pretrained_model_path: "/mnt/nw/home/a.vigouroux/spd_out/train/t-3fca69b5/completeness.pth"

task_config:
  task_name: completeness
