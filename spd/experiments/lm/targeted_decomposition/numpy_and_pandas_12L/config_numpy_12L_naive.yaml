# pile_llama_simple_mlp 12 layers — targeted decomposition (import numpy)
# --- WandB ---
wandb_project: spd
wandb_run_name: null
wandb_run_name_prefix: ""
label: "np_pd_12L_naive"

# --- General ---
seed: 0
n_mask_samples: 1
ci_config:
  mode: global
  fn_type: global_shared_mlp
  hidden_dims: [512]
sampling: continuous
sigmoid_type: leaky_hard
module_info:
  - module_pattern: h.*.mlp.c_fc
    C: 96
  - module_pattern: h.*.mlp.down_proj
    C: 96
  - module_pattern: h.*.attn.q_proj
    C: 64
  - module_pattern: h.*.attn.k_proj
    C: 64
  - module_pattern: h.*.attn.v_proj
    C: 64
  - module_pattern: h.*.attn.o_proj
    C: 96
identity_module_info: null
use_delta_component: true

# --- Loss config ---
loss_metric_configs:
  - classname: ImportanceMinimalityLoss
    coeff: 1.0e-3
    pnorm: 2.0
    beta: 0.2
    p_anneal_start_frac: 0.0
    p_anneal_final_p: 1.0
    p_anneal_end_frac: 1.0
    eps: 1.0e-12
    coeff_warmup_frac: 0.2
    coeff_peak_multiplier: 4.0
    coeff_anneal_start_frac: 0.2
    coeff_anneal_end_frac: 1.0
  - classname: StochasticReconSubsetLoss
    coeff: 1
    routing:
      type: uniform_k_subset
  - classname: PersistentPGDReconLoss
    coeff: 0.5
    optimizer:
      type: adam
      beta1: 0.5
      beta2: 0.99
      eps: 1.0e-08
      lr_schedule:
        start_val: 0.01
        warmup_pct: 0.025
        final_val_frac: 0.1
        fn_type: cosine
    scope:
      type: per_batch_per_position
    use_sigmoid_parameterization: false
    n_warmup_steps: 2
    start_frac: 0.2
output_loss_type: kl

# --- Training ---
lr_schedule:
  start_val: 5e-4
  warmup_pct: 0.0
  final_val_frac: 0.1
  fn_type: cosine
steps: 30_000
batch_size: 128
eval_batch_size: 128
grad_clip_norm_components: 0.01
grad_clip_norm_ci_fns: null
component_weight_decay: 0.1
autocast_bf16: true

# --- Faithfulness Warmup ---
faithfulness_warmup_steps: 0

# --- Logging & Saving ---
train_log_freq: 100
eval_freq: 1000
slow_eval_freq: 2000
n_eval_steps: 1
slow_eval_on_first_step: true
save_freq: null
ci_alive_threshold: 0.01

# --- Eval Metrics ---
eval_metric_configs:
  - classname: CI_L0
    groups:
      total:
        - "*"
  - classname: PGDReconLoss
    init: random
    step_size: 0.1
    n_steps: 20
    mask_scope: shared_across_batch
  - classname: TargetReconLoss
    rounding_threshold: 0.01
  - classname: WeightMagnitude
  # - classname: StochasticHiddenActsReconLoss
  - classname: CIHiddenActsReconLoss
  - classname: UnmaskedReconLoss
  # - classname: StochasticAttnPatternsReconLoss
  #   n_heads: 6
  #   q_proj_path: "h.*.attn.q_proj"
  #   k_proj_path: "h.*.attn.k_proj"
  - classname: CIMaskedAttnPatternsReconLoss
    n_heads: 6
    q_proj_path: "h.*.attn.q_proj"
    k_proj_path: "h.*.attn.k_proj"

# --- Pretrained model info ---
pretrained_model_class: spd.pretrain.models.llama_simple_mlp.LlamaSimpleMLP
pretrained_model_path: null
pretrained_model_name: wandb:goodfire/spd/runs/t-f99617bb
pretrained_model_output_attr: idx_0
tokenizer_name: EleutherAI/gpt-neox-20b

# --- Task Specific (target data) ---
task_config:
  task_name: lm
  prompts_file: /mnt/nw/home/a.vigouroux/SPD/batch_commands/numpy/reference_12L/prompts/numpy_and_pandas.txt
  max_seq_len: 3
